# =============================================================================
# Default Clash configuration template
# Generated by proxy-collector. Customize via template.base in config.toml.
#
# This is the COMPLETE config template. Dynamic sections (proxies,
# proxy-groups, rules, rule-providers, proxy-providers) are injected
# by the generator — placeholders here are replaced at build time.
# =============================================================================

# ── General ──────────────────────────────────────────────────────────────────
port: 7890
socks-port: 7891
# redir-port: 7892
# mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
external-controller: "127.0.0.1:9090"
# external-ui: dashboard
# secret: ""

# ipv6: true                     # Uncomment to enable IPv6
# unified-delay: false           # Clash Meta: unified delay display
# tcp-concurrent: true           # Clash Meta: TCP concurrent
# find-process-mode: strict      # Clash Meta: process find mode
# global-client-fingerprint: chrome  # Clash Meta: TLS fingerprint
# geo-auto-update: true          # Clash Meta: auto-update GeoIP/GeoSite
# geo-update-interval: 24        # Clash Meta: update interval in hours

# ── RESTful API ──────────────────────────────────────────────────────────────
# external-controller: 127.0.0.1:9090
# external-ui: dashboard
# secret: ""

# ── Authentication ───────────────────────────────────────────────────────────
# authentication:
#   - "user:pass"

# SOCKS5 proxy authentication (single-user)
# socks5-auth:
#   username: user
#   password: pass

# ── DNS ──────────────────────────────────────────────────────────────────────
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "localhost.ptlogin2.qq.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    # Apple services
    - "*.icloud.com"
    - "*.icloud-content.com"
    - "*.icloud.com.cn"
  nameserver:
    - 119.29.29.29
    - 114.114.114.114
    - 223.5.5.5
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ── Hosts ────────────────────────────────────────────────────────────────────
# hosts:
#   "*.example.com": 1.2.3.4
#   "example.com": 5.6.7.8

# ── TUN (Clash Meta) ─────────────────────────────────────────────────────────
# tun:
