#   server: time.apple.com
#   interval: 30

# ── Experimental ─────────────────────────────────────────────────────────────
experimental:
  ignore-resolve-fail: true

# ── Profile / Interface ──────────────────────────────────────────────────────
# profile:
#   store-selected: true
#   store-fake-ip: true

# ── Proxy Providers (injected by generator) ───────────────────────────────────
proxy-providers: ~

# ── Proxies (injected by generator) ──────────────────────────────────────────
proxies: ~

# ── Proxy Groups (injected by generator) ─────────────────────────────────────
proxy-groups: ~

# ── Rules (injected by generator) ────────────────────────────────────────────
rules: ~

# ── Rule Providers (injected by generator) ───────────────────────────────────
rule-providers: ~
