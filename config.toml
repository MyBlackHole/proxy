[[domains]]
name = "free-servers"
domain = ""
sub = ["https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"]
push_to = ["free"]
enable = true

[crawl]
enable = true
persist_dir = "./pipeline_data"

# ── GitHub ──────────────────────────────────────────────────────────
[crawl.github]
enable = true
# Set PUSH_TOKEN env var for higher API rate limits (optional)

# ── Telegram ────────────────────────────────────────────────────────
[crawl.telegram]
enable = true
search_enable = true
search_query = "免费节点 订阅 ss:// trojan:// vmess://"
search_pages = 3
pages = 5

[crawl.telegram.users]
proxyshareCN = { push_to = ["free"] }
yxjp = { push_to = ["free"] }
wodeziyuan = { push_to = ["free"] }
shiyong_jiedian = { push_to = ["free"] }

# ── Google ──────────────────────────────────────────────────────────
[crawl.google]
enable = true
limits = 100
query = "v2ray subscribe clash token subscription free"

# ── Yandex ──────────────────────────────────────────────────────────
[crawl.yandex]
enable = true
pages = 5
query = "v2ray clash subscribe token subscription"

# ── Twitter ─────────────────────────────────────────────────────────
[crawl.twitter]
enable = true
search_enable = true
search_query = "free proxy v2ray subscription ss://"
search_count = 30

# ── Discord (disabled — needs bot token) ────────────────────────────
[crawl.discord]
enable = false

# ── RSS ─────────────────────────────────────────────────────────────
[crawl.rss]
enable = false

# ── Group Config ────────────────────────────────────────────────────
[groups.free]
emoji = true
list = true

[groups.free.targets]
clash = "free-clash"

[groups.free.regularize]
enable = true
locate = true
residential = true
bits = 2

[groups.free.smart]
enable = true
region_groups = true
auto_group_type = "url-test"
fallback_group = true
load_balance_group = true
generate_rules = true
ai_rules = true
streaming_rules = true
social_rules = true
gaming_rules = false
banking_rules = false
direct_rules = true

[settings]
socks_proxy = "http://127.0.0.1:1081"

[storage]
engine = "local"

[storage.items.free-clash]
fileid = "clash.yaml"
folderid = "output"
